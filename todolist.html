<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Todo List</h1>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a new task">
            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>


<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* SVG flower pattern background */
    background-color: #b3d8e6;
    background-image: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="10" fill="%23fffde4"/><g><ellipse cx="30" cy="12" rx="6" ry="12" fill="%23a5d8c2"/><ellipse cx="30" cy="48" rx="6" ry="12" fill="%23a5d8c2"/><ellipse cx="12" cy="30" rx="12" ry="6" fill="%23a5d8c2"/><ellipse cx="48" cy="30" rx="12" ry="6" fill="%23a5d8c2"/><ellipse cx="18" cy="18" rx="6" ry="12" transform="rotate(-45 18 18)" fill="%23b7bfe7"/><ellipse cx="42" cy="18" rx="6" ry="12" transform="rotate(45 42 18)" fill="%23b7bfe7"/><ellipse cx="18" cy="42" rx="6" ry="12" transform="rotate(45 18 42)" fill="%23b7bfe7"/><ellipse cx="42" cy="42" rx="6" ry="12" transform="rotate(-45 42 42)" fill="%23b7bfe7"/></g></svg>');
    background-repeat: repeat;
    background-size: 60px 60px;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 400px;
    margin: 60px auto;
    background: #e6f2ff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 32px 24px 24px 24px;
}

h1 {
    text-align: center;
    color: #060607;
    margin-bottom: 24px;
}

#todo-form {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
}

#todo-input {
    flex: 1;
    padding: 10px;
    border: 1px solid #7983a3;
    border-radius: 4px;
    font-size: 16px;
}

#todo-form button {
    padding: 10px 18px;
    background: #0078d7;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
}

#todo-form button:hover {
    background: #005fa3;
}

#todo-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.todo-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

.todo-item:last-child {
    border-bottom: none;
}

.todo-checkbox {
    width: 18px;
    height: 18px;
    margin-right: 12px;
    cursor: pointer;
}

.todo-text {
    flex: 1;
    font-size: 16px;
    color: #080808;
    cursor: pointer;
    transition: color 0.2s;
}

.todo-text.completed {
    text-decoration: line-through;
    color: #030303;
}

.delete-btn {
    background: none;
    border: none;
    color: #e74c3c;
    font-size: 18px;
    cursor: pointer;
    margin-left: 12px;
    transition: color 0.2s;
}

.delete-btn:hover {
    color: #c0392b;
}

@media (max-width: 500px) {
    .container {
        max-width: 95vw;
        padding: 18px 6vw 18px 6vw;
    }
    h1 {
        font-size: 1.5rem;
    }
}
</style>

<script>
const form = document.getElementById('todo-form');
const todoInput = document.getElementById('todo-input');
const todoList = document.getElementById('todo-list');

function createTodoItem(text, completed = false) {
    const li = document.createElement('li');
    li.className = 'todo-item';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'todo-checkbox';
    checkbox.checked = completed;
    checkbox.onchange = () => {
        span.classList.toggle('completed');
    };

    const span = document.createElement('span');
    span.className = 'todo-text' + (completed ? ' completed' : '');
    span.textContent = text;

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.innerHTML = '&times;';
    deleteBtn.onclick = () => {
        todoList.removeChild(li);
    };

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(deleteBtn);
    return li;
}

form.onsubmit = function(e) {
    e.preventDefault();
    const text = todoInput.value.trim();
    if (text) {
        const todoItem = createTodoItem(text);
        todoList.appendChild(todoItem);
        todoInput.value = '';
        todoInput.focus();
    }
};
</script>
</body>
</html>
